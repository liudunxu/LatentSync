# Pre-built finetune dataset recipes.
#
# Each entry describes one downloadable dataset. The init_finetune_dataset.py
# script reads this YAML, downloads a sampled subset from HuggingFace
# Hub, runs the LatentSync face detector, curates into yaw/motion
# buckets, and writes a fileslist.txt ready to plug into
# gradio_finetune Tab 1.
#
# Adding a new entry is the only change needed to expose a new
# dataset in the gradio UI — no code edit required. The dropdown
# auto-populates from this file at startup.
#
# Field reference:
#   id            — short identifier, used as the output directory name.
#   name          — display label shown in the gradio dropdown.
#   hf_repo       — HuggingFace dataset repo id (e.g.
#                   "Reverb/voxceleb2"). Repo is treated as type=dataset
#                   unless hf_repo_type is set.
#   hf_repo_type  — "dataset" (default) or "model".
#   hf_allow      — list of glob patterns to scope the download.
#                   Single-archive bundles ("videos.tar") are
#                   auto-extracted by init_finetune_dataset.py.
#   n_clips       — how many video clips to actually pull + curate.
#   target_ratio  — yaw/motion bucket weights; must sum to ~1.0.
#                   Defaults to {frontal: 0.45, side_face: 0.35,
#                   fast_motion: 0.20}.
#   curate_args   — optional dict passed as CLI flags to
#                   curate_finetune_samples.py.  Use it to relax thresholds
#                   for small seed datasets, e.g.
#                   {min_frames: 16, face_detected_ratio: 0.2}.
#                   Also supports mouth_open_min to keep only clips whose
#                   mouth openness exceeds the threshold, e.g. {mouth_open_min: 0.22}
#                   for bigger mouth shapes. Pair with mouth_open_min_mode
#                   (mean/max/p95, default p95) — p95 captures peak big-open
#                   moments and recalls far more clips than the mean.
#   description   — multi-line; surfaces in the gradio dropdown
#                   description and in the post-curation paste-able
#                   instructions.
#
# ──────────────────────────────────────────────────────────────
#  Manual alternatives (NOT auto-downloadable from HF Hub):
#
#  • VoxCeleb2 (academic): apply at
#    http://www.robots.ox.ac.uk/~vgg/data/voxceleb/vox2.html —
#    ~300GB of .mp4 + .m4a files. Drop the dev/ directory under
#    data/ and write fileslist.txt manually (or use
#    tools/write_fileslist.py).
#
#  • HDTF (research-only): https://github.com/MRzzm/HDTF —
#    ~16h of HD talking-face clips. Best for the "general baseline"
#    recipe when you can't get VoxCeleb2 access.
#
#  • Multi-Human Interactive Talking Dataset (showlab, 12h,
#    multi-speaker): https://github.com/showlab/Multi-human-
#    Talking-Video-Dataset — not on HF Hub; clone the repo and
#    run tools/preprocess_short_drama.py on each clip first.
# ──────────────────────────────────────────────────────────────

datasets:
  - id: celebv_hq_side
    name: CelebV-HQ (1k, 带 yaw 标注, 侧脸专项)
    hf_repo: SwayStar123/CelebV-HQ
    hf_repo_type: dataset
    hf_allow: ["videos.tar"]            # single archive, auto-extracted
    n_clips: 1000
    target_ratio: {frontal: 0.30, side_face: 0.55, fast_motion: 0.15}
    description: |
      CelebV-HQ 含 head pose 标注,侧脸/转头场景丰富。side_face 桶提到 55%,
      适合「侧脸唇形」类 badcase。repo 只提供单个 videos.tar,脚本自动解压。
    typical_use: "💋 Side-Face Lip Quality (LoRA+conv, 18-22GB)"

  - id: talkvid_sample
    name: TalkVid (1k, 多语言, 大规模通用)
    hf_repo: FreedomIntelligence/TalkVid
    hf_repo_type: dataset
    hf_allow: ["*.mp4"]
    n_clips: 1000
    target_ratio: {frontal: 0.40, side_face: 0.40, fast_motion: 0.20}
    description: |
      TalkVid: 1244h, 7729 speakers, 15 语言。规模大,身份多样。
      适合想要"广覆盖"的 finetune(Stage 2 LoRA baseline)。
      mp4 文件直接列在 repo 顶层,1500 个 mp4。
    typical_use: "Stage 2 LoRA baseline / 🎯 Badcase Fix"

  - id: lipsync_clean_78
    name: LipSync Clean (78 mp4+txt, 最小可信 finetune seed)
    hf_repo: yashlanjewar20/lipsync_clean
    hf_repo_type: dataset
    hf_allow: ["*.mp4"]
    n_clips: 78
    target_ratio: {frontal: 0.50, side_face: 0.30, fast_motion: 0.20}
    curate_args: {min_frames: 16, face_detected_ratio: 0.2, yaw_side_max: 60, det_threshold: 0.2}
    description: |
      小而干净的 78 个 mp4 + 配对 txt 转录。适合作为最小 finetune seed
      (LoRA 几十个 epoch 验证流程),后续再加数据。若 HF Xet 后端 401,
      init_finetune_dataset.py 会自动禁用 Xet 并回退到普通 HTTP 下载。
      为保留下载后可用,curate 阈值已放宽(最短 16 帧、人脸检出率 0.2)。
    typical_use: "Stage 2 LoRA smoke test / 流程验证"

  - id: celebv_hq_head_talk_side
    name: CelebV-HQ Head-Talk (1.5k, 侧脸/转头专项)
    hf_repo: saeed-5959/celebv_hq_head_talking
    hf_repo_type: dataset
    hf_allow: ["lip_sync/*.mp4", "lip_sync_2/*.mp4", "head_talk/*.mp4", "head_talk_2/*.mp4"]
    n_clips: 1500
    target_ratio: {frontal: 0.25, side_face: 0.60, fast_motion: 0.15}
    curate_args: {min_frames: 16, face_detected_ratio: 0.2, yaw_side_max: 70, det_threshold: 0.2}
    align_args: {det_threshold: 0.10, max_fail_ratio: 0.6, side_face_max_fail_ratio: 0.85}
    description: |
      CelebV-HQ 中专注于头部说话的 512×512 片段。覆盖仓库全部四个子集
      (lip_sync / lip_sync_2 / head_talk / head_talk_2,~23k 候选),
      yaw 变化与转头动作丰富,侧脸桶提到 60%,专门用来改善侧脸唇形同步
      badcase。curation 已做质量门控,alignment 不再因 fail ratio 丢 clip
      (只在从未检出人脸时丢),侧脸/转头片段靠补帧保留——这是这类数据
      的正常处理。det_threshold 降到 0.10 提高逐帧检出率、减少补帧。
    typical_use: "💋 Side-Face Lip Quality (LoRA+conv, 18-22GB)"

  - id: celebv_hq_head_talk_side_big_mouth
    name: CelebV-HQ Head-Talk Big-Mouth (1.5k, 侧脸+大嘴筛选)
    hf_repo: saeed-5959/celebv_hq_head_talking
    hf_repo_type: dataset
    hf_allow: ["lip_sync/*.mp4", "lip_sync_2/*.mp4", "head_talk/*.mp4", "head_talk_2/*.mp4"]
    n_clips: 1500
    target_ratio: {frontal: 0.25, side_face: 0.60, fast_motion: 0.15}
    curate_args: {min_frames: 16, face_detected_ratio: 0.2, yaw_side_max: 70, det_threshold: 0.2, mouth_open_min: 0.22, mouth_open_min_mode: p95}
    align_args: {det_threshold: 0.10, max_fail_ratio: 0.6, side_face_max_fail_ratio: 0.85}
    description: |
      同 celebv_hq_head_talk_side 的数据源(四子集全覆盖),但在 curate 阶段
      额外用 mouth_openness 的 p95(峰值开合)≥0.22 筛选出张嘴幅度更大的片段。
      p95 比 mean 召回更多大嘴样本(说话片段大部分时间闭嘴,mean 会被拉低)。
      适合「侧脸+大嘴形」badcase 的专项强化,改善微调后张嘴幅度偏小。
    typical_use: "💋 Side-Face + Big Mouth (LoRA+conv, 18-22GB)"

  - id: celebv_hq_head_talk_huge_mouth
    name: CelebV-HQ Head-Talk Huge Mouth (1.5k, 大嘴强化 p95≥0.30)
    hf_repo: saeed-5959/celebv_hq_head_talking
    hf_repo_type: dataset
    hf_allow: ["lip_sync/*.mp4", "lip_sync_2/*.mp4", "head_talk/*.mp4", "head_talk_2/*.mp4"]
    n_clips: 1500
    target_ratio: {frontal: 0.25, side_face: 0.60, fast_motion: 0.15}
    curate_args: {min_frames: 16, face_detected_ratio: 0.2, yaw_side_max: 70, det_threshold: 0.2, mouth_open_min: 0.30, mouth_open_min_mode: p95}
    align_args: {det_threshold: 0.10, max_fail_ratio: 0.6, side_face_max_fail_ratio: 0.85}
    description: |
      同 celebv_hq_head_talk_side_big_mouth 的数据源,但把 mouth_openness p95 阈值
      从 0.22 提到 0.30,专门筛选大笑、重音、嘴张得很夸张的片段。
      样本数会比 big_mouth 少,但峰值嘴型更大,适合「微调后嘴张不开 / 嘴型幅度偏小」
      的 badcase。建议和 big_mouth 或通用数据混合使用,避免过拟合到夸张嘴型。
    typical_use: "💋 Side-Face Lip Quality (LoRA+conv, 18-22GB) / 大嘴幅度专项"

  - id: voxceleb2_sample
    name: VoxCeleb2 Sample (500 clips, 通用 baseline / 侧脸混合)
    hf_repo: Reverb/voxceleb2
    hf_repo_type: dataset
    hf_allow: ["**/*.mp4"]
    n_clips: 500
    target_ratio: {frontal: 0.45, side_face: 0.35, fast_motion: 0.20}
    curate_args: {min_frames: 16, face_detected_ratio: 0.2, yaw_side_max: 70, det_threshold: 0.2}
    align_args: {det_threshold: 0.10, max_fail_ratio: 0.6, side_face_max_fail_ratio: 0.85}
    description: |
      VoxCeleb2 的 500-clip 采样版(~5-10GB),不用下完整 300GB。
      身份/场景/姿态多样性高,适合作为通用 finetune seed 或与侧脸专项数据混合。
      如果 HF Xet 后端 401,init_finetune_dataset.py 会自动禁用 Xet 并回退到普通 HTTP 下载。
      需要 --hf-token 或 HF_TOKEN 环境变量(gated 数据集)。
    typical_use: "Stage 2 LoRA baseline / 通用扩展 / 与侧脸数据混合"

  - id: celebv_hq_head_talk_extreme_yaw
    name: CelebV-HQ Head-Talk Extreme Yaw (>45°, 混合 15% 正脸)
    hf_repo: saeed-5959/celebv_hq_head_talking
    hf_repo_type: dataset
    hf_allow: ["lip_sync/*.mp4", "lip_sync_2/*.mp4", "head_talk/*.mp4", "head_talk_2/*.mp4"]
    n_clips: 2500
    target_ratio: {frontal: 0.15, side_face: 0.65, fast_motion: 0.20}
    curate_args: {min_frames: 16, face_detected_ratio: 0.15, yaw_side_max: 80, det_threshold: 0.15}
    align_args: {det_threshold: 0.05, max_fail_ratio: 0.6, side_face_max_fail_ratio: 0.90}
    description: |
      同 celebv_hq_head_talk_side 的数据源,但把 yaw_side_max 放宽到 80°,
      并提高 side_face 桶比例到 65%、frontal 降到 15%,专门召回 yaw>45° 的
      极端侧脸/转头片段。curation/alignment 阈值同步放宽,减少真实极端侧脸
      因"检出率不足"或"对齐阶段从未检出人脸"而被丢弃。适合「重度侧脸
      (yaw 45-80°)唇形不同步」或「转头到极限时嘴消失」类 badcase。
      注意:推理时也要同步提高 yaw_skip_threshold(建议 60-80°),否则训练完仍会被跳过。
    typical_use: "💋 Side-Face Lip Quality (LoRA+conv, 18-22GB) / 极端侧脸专项"

  - id: lipsync_full_159
    name: LipSync Full (159 mp4+txt, 通用扩展)
    hf_repo: yashlanjewar20/lipsync
    hf_repo_type: dataset
    hf_allow: ["*.mp4"]
    n_clips: 159
    target_ratio: {frontal: 0.45, side_face: 0.35, fast_motion: 0.20}
    description: |
      yashlanjewar20/lipsync_clean 的完整版 159 个片段 + 配对 txt。
      在 clean 78 条基础上翻倍,身份/场景更多,适合作为通用 finetune seed
      或和侧脸专项数据混合训练。
    typical_use: "Stage 2 LoRA baseline / 🎯 Badcase Fix"

  - id: fidelity_hq_1k
    name: Fidelity HQ (1k, 正脸60+侧脸30+快运动10, 防 badcase)
    hf_repo: saeed-5959/celebv_hq_head_talking
    hf_repo_type: dataset
    hf_allow: ["lip_sync/*.mp4", "lip_sync_2/*.mp4", "head_talk/*.mp4", "head_talk_2/*.mp4"]
    n_clips: 1000
    target_ratio: {frontal: 0.60, side_face: 0.30, fast_motion: 0.10}
    curate_args: {min_frames: 16, face_detected_ratio: 0.2, yaw_side_max: 70, det_threshold: 0.2}
    align_args: {det_threshold: 0.10, max_fail_ratio: 0.6, side_face_max_fail_ratio: 0.85}
    description: |
      「尽量多画面唇形同步 + 不出 badcase」的混合策略:
      只在干净正脸训练,模型永远学不会硬样本 — 推理遇到中等侧脸/快运动照样崩
      (极端帧由推理侧 prefilter 跳过兜底,中等帧必须靠模型自己会)。
      所以 frontal 60% 保可同步信号主体,side_face 30%(仓库决策树修复侧脸
      badcase 的经验阈值是训练数据 30%+ 侧脸),fast_motion 10% 补运动覆盖。
      桶内仍按嘴部开合峰值排序,各桶都优先挑 sync 信号最强的子集。
      召回档门控(同侧脸专项配方):yaw 召回放宽到 70°,对齐失败靠补帧保留。
      注意:frontal 池不足时会从其他桶 backfill;完工后看 curation_report.json
      的 by_bucket 确认实际构成。
      如需身份多样性,可再跑 voxceleb2_sample 并合并 fileslist(cat 两个 fileslist.txt)。
    typical_use: "🎨 Lip Forcing 风格 (保真优先 LoRA, 512)"
