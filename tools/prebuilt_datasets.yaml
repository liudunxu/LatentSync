# Pre-built finetune dataset recipes.
#
# Each entry describes one downloadable dataset. The init_finetune_dataset.py
# script reads this YAML, downloads a sampled subset from HuggingFace
# Hub, runs the LatentSync face detector, curates into yaw/motion
# buckets, and writes a fileslist.txt ready to plug into
# gradio_finetune Tab 1.
#
# Adding a new entry is the only change needed to expose a new
# dataset in the gradio UI — no code edit required. The dropdown
# auto-populates from this file at startup.
#
# Field reference:
#   id            — short identifier, used as the output directory name.
#   name          — display label shown in the gradio dropdown.
#   hf_repo       — HuggingFace dataset repo id (e.g.
#                   "Reverb/voxceleb2"). Repo is treated as type=dataset
#                   unless hf_repo_type is set.
#   hf_repo_type  — "dataset" (default) or "model".
#   hf_allow      — list of glob patterns to scope the download.
#                   Single-archive bundles ("videos.tar") are
#                   auto-extracted by init_finetune_dataset.py.
#   n_clips       — how many video clips to actually pull + curate.
#   target_ratio  — yaw/motion bucket weights; must sum to ~1.0.
#                   Defaults to {frontal: 0.45, side_face: 0.35,
#                   fast_motion: 0.20}.
#   description   — multi-line; surfaces in the gradio dropdown
#                   description and in the post-curation paste-able
#                   instructions.
#
# ──────────────────────────────────────────────────────────────
#  Manual alternatives (NOT auto-downloadable from HF Hub):
#
#  • VoxCeleb2 (academic): apply at
#    http://www.robots.ox.ac.uk/~vgg/data/voxceleb/vox2.html —
#    ~300GB of .mp4 + .m4a files. Drop the dev/ directory under
#    data/ and write fileslist.txt manually (or use
#    tools/write_fileslist.py).
#
#  • HDTF (research-only): https://github.com/MRzzm/HDTF —
#    ~16h of HD talking-face clips. Best for the "general baseline"
#    recipe when you can't get VoxCeleb2 access.
#
#  • Multi-Human Interactive Talking Dataset (showlab, 12h,
#    multi-speaker): https://github.com/showlab/Multi-human-
#    Talking-Video-Dataset — not on HF Hub; clone the repo and
#    run tools/preprocess_short_drama.py on each clip first.
# ──────────────────────────────────────────────────────────────

datasets:
  - id: celebv_hq_side
    name: CelebV-HQ (1k, 带 yaw 标注, 侧脸专项)
    hf_repo: SwayStar123/CelebV-HQ
    hf_repo_type: dataset
    hf_allow: ["videos.tar"]            # single archive, auto-extracted
    n_clips: 1000
    target_ratio: {frontal: 0.30, side_face: 0.55, fast_motion: 0.15}
    description: |
      CelebV-HQ 含 head pose 标注,侧脸/转头场景丰富。side_face 桶提到 55%,
      适合「侧脸唇形」类 badcase。repo 只提供单个 videos.tar,脚本自动解压。
    typical_use: "💋 Side-Face Lip Quality (LoRA+conv, 18-22GB)"

  - id: talkvid_sample
    name: TalkVid (1k, 多语言, 大规模通用)
    hf_repo: FreedomIntelligence/TalkVid
    hf_repo_type: dataset
    hf_allow: ["*.mp4"]
    n_clips: 1000
    target_ratio: {frontal: 0.40, side_face: 0.40, fast_motion: 0.20}
    description: |
      TalkVid: 1244h, 7729 speakers, 15 语言。规模大,身份多样。
      适合想要"广覆盖"的 finetune(Stage 2 LoRA baseline)。
      mp4 文件直接列在 repo 顶层,1500 个 mp4。
    typical_use: "Stage 2 LoRA baseline / 🎯 Badcase Fix"

  - id: lipsync_clean_78
    name: LipSync Clean (78 mp4+txt, 最小可信 finetune seed)
    hf_repo: yashlanjewar20/lipsync_clean
    hf_repo_type: dataset
    hf_allow: ["*.mp4"]
    n_clips: 78
    target_ratio: {frontal: 0.50, side_face: 0.30, fast_motion: 0.20}
    description: |
      小而干净的 78 个 mp4 + 配对 txt 转录。已实测可下(HF 直接 .mp4,无 Xet/CAS)。
      适合作为最小 finetune seed(LoRA 几十个 epoch 验证流程),后续再加数据。
    typical_use: "Stage 2 LoRA smoke test / 流程验证"
